<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6d45a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="孵蛋反查">
  <title>洛克王国世界孵蛋反查</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero" aria-label="孵蛋反查">
      <div class="egg-mark" aria-hidden="true">
        <div class="egg"></div>
        <span></span><span></span><span></span>
      </div>
      <div>
        <p class="kicker">Roco Egg Finder</p>
        <h1>孵蛋反查</h1>
        <p class="subhead">输入蛋的尺寸和重量，马上筛出可能孵出的精灵。</p>
      </div>
    </section>

    <section class="search-panel" aria-label="输入数据">
      <div class="field-grid">
        <label>
          <span>尺寸 / 身高 m</span>
          <input id="heightInput" inputmode="decimal" type="number" min="0" step="0.001" placeholder="例如 0.25">
        </label>
        <label>
          <span>重量 kg</span>
          <input id="weightInput" inputmode="decimal" type="number" min="0" step="0.001" placeholder="例如 1.60">
        </label>
      </div>

      <div class="filter-row" role="group" aria-label="蛋类型">
        <button class="filter is-active" data-filter="all" type="button">全部</button>
        <button class="filter" data-filter="main" type="button">普通</button>
        <button class="filter" data-filter="magic" type="button">神奇的蛋</button>
      </div>

      <button id="clearBtn" class="ghost-button" type="button">清空</button>
    </section>

    <section class="result-summary" aria-live="polite">
      <div>
        <span id="statusPill" class="status-pill">等待输入</span>
        <h2 id="resultTitle">先输入尺寸和重量</h2>
      </div>
      <p id="resultHint">数据来自公开资料整理，共 <strong>125</strong> 条；不是官方全量库。</p>
    </section>

    <section id="results" class="results" aria-label="匹配结果"></section>

    <details class="source-box">
      <summary>数据范围与来源</summary>
      <p>当前内置 98 条普通蛋尺寸/重量对照记录，以及 27 条“神奇的蛋”记录。若游戏更新，匹配结果需要重新整理数据。</p>
      <p>来源：绿茶安卓网、养鸵博客论坛、rocomwiki.app 前端选项。</p>
    </details>
  </main>
